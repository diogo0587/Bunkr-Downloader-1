kind = "web"
previewPath = "/"
title = "Bunkr Downloader"
version = "1.0.0"
id = "artifacts/bunkr-downloader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21497

[services.development]
run = "pnpm --filter @workspace/bunkr-downloader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bunkr-downloader", "run", "build" ]
publicDir = "artifacts/bunkr-downloader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21497"
BASE_PATH = "/"
